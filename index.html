<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <title>Expense Tracker</title>
</head>

<body>

    <main>
        <section class="sidebar">
            <div class="expenses-all-wrapper">
                <h1 class="main-title">Мои расходы</h1>
                <p class="main-sub">Следи за своими тратами</p>

                <div class="money-wrapper">
                    <p>Всего потрачено</p>
                    <span class="spend-money">0 ₽</span>
                    <p>за этот месяц</p>
                </div>
            </div>

            <div class="categories-wrapper">
                <h2>Фильтр по категории</h2>
                <ul class="filter-category">
                    <li class="category-item category-selected">Все категории</li>
                    <li class="category-item">Другое</li>
                </ul>
            </div>

            <div class="count-expenses">
                <p>Количество расходов</p>
                <span class="count-number">0</span>
            </div>
        </section>

        <div class="content">
            <section class="form-expense">
                <h2 class="expense-title">Добавить расход</h2>
                <form class="add-expense">

                    <div class="input-name">
                        <label class="expense-label" for="name">Название</label>
                        <input id="name" type="text" placeholder="Например: Кофе" name="name">
                    </div>

                    <div class="input-cost">
                        <label class="expense-label" for="cost">Сумма (₽)</label>
                        <input id="cost" type="number" placeholder="Например: 250" name="cost">
                    </div>

                    <div class="select-category">
                        <label class="expense-label" for="category">Категория</label>
                        <select id="category">
                            <option value="food">Еда</option>
                            <option value="transport">Транспорт</option>
                            <option value="entertainment">Развлечения</option>
                            <option value="shopping">Покупки</option>
                            <option value="health">Здоровье</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>

                    <button type="submit">Добавить расход</button>
                </form>
            </section>

            <section class="list-expense">
                <h2>Список расходов</h2>

                <form class="find-expense">
                    <input type="text" placeholder="Поиск по названию...">

                    <select>
                        <option value="new">Сортировка: сначала новые</option>
                        <option value="old">Сортировка: сначала старые</option>
                    </select>
                </form>

                <ul class="expenses-list">
                    <li class="expense-item" data-expense-cost="250">
                        <span class="expense-icon"></span>
                        <p class="expense-name">Кофе</p>
                        <p class="expense-category">Еда</p>
                        <span class="expense-cost">250 ₽</span>
                        <p class="expense-date">4 июля 2026</p>
                        <button class="expense-delete" type="button">X</button>
                    </li>
                </ul>

            </section>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
